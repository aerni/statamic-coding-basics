title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: lead
            field:
              type: text
              display: Lead
          -
            handle: date
            field:
              type: date
              display: Date
          -
            handle: image
            field:
              container: assets
              type: assets
              display: Image
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
