<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post – Random Thoughts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #F5F0E8;
      --ink: #1a1a1a;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --input-focus: rgba(200, 80, 192, 0.4);
    }

    body {
      background-color: var(--cream);
      font-family: 'Poppins', sans-serif;
      color: var(--ink);
    }

    /* Typography */
    .font-main-display {
      font-family: 'Poppins', sans-serif;
    }

    .page-title {
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    /* Navbar */
    nav {
      background-color: var(--cream);
    }

    .nav-link {
      position: relative;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--ink);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: var(--ink);
      transition: width 0.2s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Form Container */
    .form-card {
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: var(--card-shadow);
      padding: 2.5rem;
    }

    /* Form Inputs */
    .form-input {
      width: 100%;
      background: #fdfdfd;
      border: 1.5px solid #e5e7eb;
      border-radius: 0.5rem;
      padding: 0.875rem 1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: #c850c0;
      box-shadow: 0 0 0 3px var(--input-focus);
      background: #ffffff;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Thumbnail Upload Area */
    .thumbnail-upload {
      border: 2px dashed #d1d5db;
      border-radius: 0.75rem;
      background: #fafafa;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .thumbnail-upload:hover {
      border-color: #f857a6;
      background: #fffcfd;
    }

    /* Gradient Button */
    .btn-submit {
      background: linear-gradient(135deg, #c850c0 0%, #f857a6 50%, #ff5f6d 100%);
      color: white;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.02em;
      border-radius: 0.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(248, 87, 166, 0.4);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.15s; }
    .delay-3 { animation-delay: 0.25s; }
    .delay-4 { animation-delay: 0.35s; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="px-8 py-5 flex items-center justify-between border-b border-black/5">
    <a href="index.html" class="nav-link font-main-display font-bold text-base tracking-wide">Random Thoughts</a>
    <div class="flex items-center gap-8">
      <a href="blog.antlers.html" class="nav-link">Blog</a>
      <a href="about.antlers.html" class="nav-link">About</a>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-3xl mx-auto px-4 pt-16 pb-24">
    
    <header class="text-center mb-10 fade-up delay-1">
      <h1 class="page-title text-4xl sm:text-5xl uppercase mb-3">Create New Post</h1>
      <p class="text-sm font-medium text-gray-500 tracking-wide">Share what's on your mind today.</p>
    </header>

    <div class="form-card fade-up delay-2">
      <form action="#" method="POST" enctype="multipart/form-data" class="space-y-6">
        
        <div class="fade-up delay-3">
          <label class="form-label">Post Thumbnail</label>
          <div class="thumbnail-upload w-full h-48 flex flex-col items-center justify-center relative overflow-hidden">
            <input type="file" name="thumbnail" id="thumbnail" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/*" />
            
            <div class="text-center pointer-events-none">
              <svg class="mx-auto h-10 w-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
              <p class="text-sm text-gray-600 font-medium">Click to upload or drag and drop</p>
              <p class="text-xs text-gray-400 mt-1">PNG, JPG, GIF up to 5MB</p>
            </div>
          </div>
        </div>

        <div class="fade-up delay-3">
          <label for="title" class="form-label">Title</label>
          <input type="text" id="title" name="title" class="form-input text-lg font-semibold placeholder:font-normal" placeholder="Give your post a catchy title..." required />
        </div>

        <div class="fade-up delay-3">
          <label for="date" class="form-label">Publish Date</label>
          <input type="date" id="date" name="date" class="form-input text-gray-600" />
        </div>

        <div class="fade-up delay-4">
          <label for="content" class="form-label">Content</label>
          <textarea id="content" name="content" rows="10" class="form-input resize-y leading-relaxed" placeholder="Write your thoughts here... HTML and Markdown supported." required></textarea>
        </div>

        <div class="pt-4 fade-up delay-4 flex items-center justify-between">
          <button type="button" class="text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors">
            Save as Draft
          </button>
          <button type="submit" class="btn-submit px-8 py-3.5">
            Publish Post
          </button>
        </div>

      </form>
    </div>

  </main>

  <footer class="text-center py-8 border-t border-black/5 mt-auto">
    <span class="font-medium text-[0.75rem] text-gray-500 tracking-wide">© 2028 Random Thoughts</span>
  </footer>

</body>
</html>
