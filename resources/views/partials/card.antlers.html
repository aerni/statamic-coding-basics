<a href="{{ url }}" class="flex flex-col h-full overflow-hidden transition ease-out bg-zinc-800 shadow-lg rounded-xl border border-orange-100/30 hover:-translate-y-1 hover:shadow-xl">
    {{ hero_image }}<img src="{{ url }}" alt="{{ alt }}" class="object-cover w-full h-72 bg-hot-pink">{{ /hero_image }}
    <div class="flex flex-col justify-between flex-1 gap-4 p-6 md:gap-5 md:p-8">
        <h2 class="font-display italic font-medium text-xl md:text-2xl">{{ title }}</h2>
        <div class="flex items-center justify-between gap-4">
            {{ if date }}<p class="font-sans text-xs text-zinc-600">{{ date format="j. F Y" }}</p>{{ /if }}
            {{ author }}
            <div class="flex items-center gap-2">
                {{ if avatar }}
                    <img src="{{ avatar }}" alt="{{ name }}" class="w-6 h-6 rounded-full object-cover">
                {{ else }}
                    <div class="flex items-center justify-center w-6 h-6 rounded-full bg-zinc-600 text-zinc-300 text-xs font-semibold font-sans">{{ initials }}</div>
                {{ /if }}
                <p class="font-sans text-xs text-zinc-600">{{ name }}</p>
            </div>
            {{ /author }}
        </div>
    </div>
</a>
